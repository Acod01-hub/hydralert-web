version: '3.9'

services:
  # ── MongoDB ─────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: hydralert-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: hydralert
    volumes:
      - mongo_data:/data/db
    ports:
      - '27017:27017'
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ML Scoring Service (Flask) ───────────────────────────
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: hydralert-ml
    restart: unless-stopped
    ports:
      - '5001:5001'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5001/health']
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Backend (Node/Express) ───────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hydralert-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    environment:
      MONGO_URI:        mongodb://mongo:27017/hydralert
      JWT_SECRET:       ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRES_IN:   7d
      OPENWEATHER_KEY:  ${OPENWEATHER_KEY:-}
      ML_SERVICE_URL:   http://ml-service:5001
      NODE_ENV:         production
      PORT:             5000
    ports:
      - '5000:5000'

  # ── Frontend (Nginx serving Vite build) ─────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: hydralert-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '3000:80'

volumes:
  mongo_data:
